services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: position_tracker
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d position_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: syncs the Prisma schema to the database, then exits.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/position_tracker?schema=public"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/position_tracker?schema=public"
      APP_PASSWORD: "${APP_PASSWORD:-changeme}"
      AUTH_SECRET: "${AUTH_SECRET:-dev-secret-change-me}"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
