services:
  # One-shot: syncs the Prisma schema to the database, then exits.
  migrate:
    build:
      context: .
      target: migrator
    environment:
      # Postgres connection string. No local default here — production must
      # supply a real one (GitHub Actions secret / host env). Local dev gets
      # a bundled Postgres wired up automatically via docker-compose.override.yml.
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required (see .env.example)}"
    restart: "no"

  app:
    build:
      context: .
      target: runner
      args:
        # Public origin(s) for the Server-Action check, baked in at build time.
        # Supplied by CI from a secret; empty locally / before a domain exists.
        ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    restart: unless-stopped
    environment:
      DATABASE_URL: "${DATABASE_URL:?DATABASE_URL is required (see .env.example)}"
      APP_PASSWORD: "${APP_PASSWORD:-changeme}"
      AUTH_SECRET: "${AUTH_SECRET:-dev-secret-change-me}"
    # Published on all interfaces by default so the app is reachable on the LAN
    # at http://<pi-ip>:3000 (handy before a domain/tunnel exists). Set
    # APP_BIND_ADDR=127.0.0.1 to restrict to the box once the tunnel fronts it.
    ports:
      - "${APP_BIND_ADDR:-0.0.0.0}:3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  # Cloudflare Tunnel: makes an OUTBOUND connection to Cloudflare and serves the
  # app on your domain without any open inbound ports / port forwarding. The route
  # (hostname -> http://app:3000) and TLS are configured in the Cloudflare
  # Zero Trust dashboard; this container just needs the tunnel token.
  # Only starts when the "tunnel" profile is enabled (see docs).
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN:-}"
    depends_on:
      app:
        condition: service_started
    profiles:
      - tunnel
